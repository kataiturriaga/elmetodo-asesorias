<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Composición Corporal — Flujo</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020a06;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Open Sans', sans-serif;
  }

  /* Ventana fija del teléfono */
  .phone {
    width: 393px;
    height: 852px;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 40px 120px rgba(0,0,0,0.8);
    position: relative;
  }

  /* Rail horizontal que contiene las dos pantallas */
  .rail {
    display: flex;
    width: 786px; /* 393 × 2 */
    height: 852px;
    transform: translateX(0);
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .rail.show-result {
    transform: translateX(-393px);
  }

  /* Pantalla base */
  .screen {
    width: 393px;
    height: 852px;
    flex-shrink: 0;
    background: radial-gradient(ellipse at center, #041B19 0%, #020F08 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* ─── BADGE ─── */
  .badge {
    margin-top: 56px;
    background: #00ee00;
    border-radius: 1000px;
    padding: 10px 28px;
    color: #040d08;
    font-size: 15px;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* ═══════════════════════════
     PANTALLA 1 — PROCESANDO
  ═══════════════════════════ */

  .photo-wrapper {
    margin-top: 64px;
    position: relative;
    display: flex;
    justify-content: center;
  }

  .card-glow {
    position: absolute;
    bottom: -55px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    height: 110px;
    background: radial-gradient(ellipse at center, #75FFCF 0%, #202020 70%);
    pointer-events: none;
    opacity: 0.55;
    filter: blur(18px);
  }

  .photo-scale-wrapper {
    animation: scalePulse 2.2s ease-in-out infinite;
    will-change: transform;
  }
  @keyframes scalePulse {
    0%, 100% { transform: scale(0.95); }
    50%       { transform: scale(1.00); }
  }

  @property --ring-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }
  .card-ring {
    width: 269px;
    height: 370px;
    border-radius: 17px;
    padding: 1px;
    background: conic-gradient(
      from var(--ring-angle),
      #b4b4b4 0deg, #000000 82deg, #cecece 168deg, #1c221f 360deg
    );
    animation: spinRing 3s linear infinite;
    will-change: --ring-angle;
  }
  @keyframes spinRing {
    from { --ring-angle: 0deg; }
    to   { --ring-angle: 360deg; }
  }
  .card-inner {
    width: 100%;
    height: 100%;
    border-radius: 16px;
    background: #15171c;
    position: relative;
    overflow: hidden;
  }
  .photo-img {
    position: absolute;
    top: 16px; left: 16px;
    width: calc(100% - 32px);
    height: calc(100% - 32px);
    object-fit: cover;
    border-radius: 8px;
  }

  .dots-section {
    position: absolute;
    bottom: 108px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .dots-row { display: flex; gap: 8px; align-items: center; }
  .dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #3c3e41;
    transition: background 0.35s ease;
  }
  .dot.active { background: #00ee00; }

  .status-text {
    color: #dbdae0;
    font-size: 14px;
    font-weight: 400;
    text-align: center;
    opacity: 1;
    transition: opacity 0.25s ease;
    white-space: nowrap;
  }
  .status-text.fade { opacity: 0; }

  /* ═══════════════════════════
     PANTALLA 2 — RESULTADO
  ═══════════════════════════ */

  .result-header {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* Foto pequeña con borde giratorio verde */
  @property --ring-angle-sm {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }
  .photo-sm-ring {
    width: 68px;
    height: 91px;
    border-radius: 17px;
    padding: 1px;
    background: conic-gradient(
      from var(--ring-angle-sm),
      #00ff08 0deg, #00ff60 82deg, #232b25 168deg, #1c221f 360deg
    );
    animation: spinRingSm 3s linear infinite;
    will-change: --ring-angle-sm;
  }
  @keyframes spinRingSm {
    from { --ring-angle-sm: 0deg; }
    to   { --ring-angle-sm: 360deg; }
  }
  .photo-sm-inner {
    width: 100%;
    height: 100%;
    border-radius: 16px;
    overflow: hidden;
    background: #15171c;
  }
  .photo-sm-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .result-caption {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .result-caption-title {
    color: #f2f2f7;
    font-size: 15px;
    font-weight: 600;
  }
  .result-caption-sub {
    color: #8f8f97;
    font-size: 13px;
    font-weight: 400;
  }

  /* Card resultado + glow debajo */
  .result-card-wrap {
    margin-top: 100px;
    position: relative;
    display: flex;
    justify-content: center;
  }
  .result-card-glow {
    position: absolute;
    bottom: -70px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 100px;
    background: radial-gradient(ellipse at center, #75FFCF 0%, #202020 70%);
    opacity: 0.45;
    filter: blur(22px);
    pointer-events: none;
    z-index: 0;
  }
  .result-card {
    position: relative;
    z-index: 1;
  }

  .result-card {
    width: 325px;
    border-radius: 8px;
    border: 1px solid #00ee00;
    background: #15171c;
    padding: 48px 20px 20px ;
    display: flex;
    flex-direction: column;
  }

  .result-card-label {
    color: #dbdae0;
    font-size: 14px;
    font-weight: 400;
    text-align: center;
    margin-bottom: 6px;
  }

  .result-number-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
    margin-bottom: 14px;
  }
  .result-arrow {
    color: #00ee00;
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }
  .result-number {
    color: #00ee00;
    font-size: 52px;
    font-weight: 800;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .result-unit {
    color: #f2f2f7;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }

  .result-divider {
    height: 1px;
    background: #3c3e41;
    margin-bottom: 12px;
  }

  .result-compare {
    text-align: center;
    margin-bottom: 12px;
  }
  .result-compare-main {
    color: #00ee00;
    font-size: 18px;
    font-weight: 700;
  }
  .result-compare-sub {
    color: #f2f2f7;
    font-size: 14px;
    font-weight: 400;
    margin-top: 2px;
    margin-bottom: 16px;
  }

  .result-insight {
    margin-top: 16px;
    background: #1d1f23;
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .result-insight-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid #3c3e41;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: #00ee00;
    font-size: 12px;
  }
  .result-insight-text {
    color: #8f8f97;
    font-size: 13px;
    font-weight: 400;
    line-height: 1.45;
  }
  .result-insight-text span { color: #00ee00; }

  /* ─── BOTÓN COMPARTIDO ─── */
  .btn-action {
    position: absolute;
    bottom: 32px;
    width: 352px;
    height: 48px;
    background: #1d1f23;
    border: none;
    border-radius: 12px;
    color: #61656c;
    font-size: 16px;
    font-weight: 600;
    font-family: 'Open Sans', sans-serif;
    cursor: default;
    transition: background 0.4s ease, color 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-action.ready {
    background: #00ee00;
    color: #040d08;
    cursor: pointer;
  }

  /* Reset button */
  .reset-btn {
    position: absolute;
    top: 16px; left: 16px;
    background: rgba(255,255,255,0.06);
    border: none;
    border-radius: 8px;
    color: #61656c;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Open Sans', sans-serif;
  }
  .reset-btn:hover { color: #dbdae0; }
</style>
</head>
<body>

<div class="phone">
  <div class="rail" id="rail">

    <!-- ══ PANTALLA 1: PROCESANDO ══ -->
    <div class="screen">
      <button class="reset-btn" onclick="resetAll()">↺ replay</button>

      <div class="badge">Composición corporal</div>

      <div class="photo-wrapper">
        <div class="card-glow"></div>
        <div class="photo-scale-wrapper">
          <div class="card-ring">
            <div class="card-inner">
              <img class="photo-img" src="image4.png" alt="foto" />
            </div>
          </div>
        </div>
      </div>

      <div class="dots-section">
        <div class="dots-row">
          <div class="dot" id="dot0"></div>
          <div class="dot" id="dot1"></div>
          <div class="dot" id="dot2"></div>
          <div class="dot" id="dot3"></div>
          <div class="dot" id="dot4"></div>
          <div class="dot" id="dot5"></div>
          <div class="dot" id="dot6"></div>
        </div>
        <div class="status-text" id="statusText">Procesando automaticamente....</div>
      </div>

      <button class="btn-action" id="btnProcesando">
        Siguiente <span>→</span>
      </button>
    </div>

    <!-- ══ PANTALLA 2: RESULTADO ══ -->
    <div class="screen">
      <div class="badge">Composición corporal</div>

      <div class="result-header">
        <div class="photo-sm-ring">
          <div class="photo-sm-inner">
            <img src="image4.png" alt="foto frontal" />
          </div>
        </div>
        <div class="result-caption">
          <div class="result-caption-title">Calculado con tu foto frontal</div>
          <div class="result-caption-sub">IA · margen estimado +/-1-3%</div>
        </div>
      </div>

      <div class="result-card-wrap">
        <div class="result-card-glow"></div>
        <div class="result-card">
          <div class="result-card-label">Grasa corporal</div>
          <div class="result-number-row">
            <span class="result-arrow">↘</span>
            <span class="result-number" id="resultNumber">0</span>
            <span class="result-unit">%</span>
          </div>
          <div class="result-divider"></div>
          <div class="result-compare">
            <div class="result-compare-main">1,2% menos</div>
            <div class="result-compare-sub">que en la revision anterior</div>
          </div>
          <div class="result-insight">
            <div class="result-insight-icon">★</div>
            <span class="result-insight-text">Mejoraste un <span>24%</span> respecto al primer ciclo. Mantén este ritmo.</span>
          </div>
        </div>
      </div>

      <button class="btn-action ready" id="btnResultado">
        Siguiente <span>→</span>
      </button>
    </div>

  </div>
</div>

<script>
const rail     = document.getElementById('rail');
const dots     = Array.from({ length: 7 }, (_, i) => document.getElementById('dot' + i));
const statusText = document.getElementById('statusText');
const btnP     = document.getElementById('btnProcesando');
const numEl    = document.getElementById('resultNumber');

const steps = [
  { text: 'Procesando automaticamente....', dotsLit: 0 },
  { text: 'Analizando tu composicion corporal...', dotsLit: 2 },
  { text: 'Estableciendo tu %...', dotsLit: 4 },
  { text: 'Listo, porcentaje calculado ✓', dotsLit: 7 },
];

let timeouts = [];

function setDotsLit(n) {
  dots.forEach((d, i) => d.classList.toggle('active', i < n));
}

function animateDotsTo(to, from) {
  for (let i = from; i < to; i++) {
    const t = setTimeout(() => dots[i].classList.add('active'), (i - from) * 220);
    timeouts.push(t);
  }
}

function applyStep(index, prevLit) {
  const step = steps[index];
  statusText.classList.add('fade');
  setTimeout(() => {
    statusText.textContent = step.text;
    statusText.classList.remove('fade');
  }, 260);
  animateDotsTo(step.dotsLit, prevLit);
  if (index === steps.length - 1) {
    const delay = (step.dotsLit - prevLit) * 220 + 500;
    const t = setTimeout(() => {
      btnP.classList.add('ready');
      btnP.innerHTML = 'Ver resultado <span>→</span>';
      btnP.onclick = goToResult;
    }, delay);
    timeouts.push(t);
  }
}

function runAnimation() {
  setDotsLit(0);
  statusText.textContent = steps[0].text;
  btnP.classList.remove('ready');
  btnP.innerHTML = 'Siguiente <span>→</span>';
  btnP.onclick = null;

  let prevLit = 0;
  [1, 2, 3].forEach((i) => {
    const t = setTimeout(() => {
      const prev = prevLit;
      prevLit = steps[i].dotsLit;
      applyStep(i, prev);
    }, i * 1800);
    timeouts.push(t);
  });
}

// Contador animado 0 → 24.5
function countUp(el, target, duration) {
  const start = performance.now();
  function tick(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3); // ease-out cubic
    const val = (target * ease).toFixed(1).replace('.', ',');
    el.textContent = val;
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function goToResult() {
  rail.classList.add('show-result');
  setTimeout(() => countUp(numEl, 24.5, 1400), 300);
}

function resetAll() {
  timeouts.forEach(clearTimeout);
  timeouts = [];
  rail.classList.remove('show-result');
  numEl.textContent = '0';
  setTimeout(runAnimation, 80);
}

window.addEventListener('load', () => setTimeout(runAnimation, 500));
</script>

</body>
</html>
