<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>8 Figuras — Animaciones</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#111318;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:48px 32px 56px;
  font-family:'Open Sans',-apple-system,sans-serif;
  gap:40px;
}
h1 { color:#f2f2f7; font-size:16px; font-weight:600; letter-spacing:0.3px; }

.grid {
  display:grid;
  grid-template-columns:repeat(4,200px);
  gap:20px 24px;
}
.card {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
.canvas {
  width:200px; height:200px;
  background:#0b0f14;
  border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.04);
}
.label {
  font-size:11px;
  color:#61656c;
  letter-spacing:0.2px;
}

/* ─── 1. ARCO DE PROGRESO ─── */
@keyframes arc-draw {
  0%   { stroke-dashoffset:452; opacity:.3 }
  10%  { opacity:1 }
  70%  { stroke-dashoffset:113 }
  85%, 100% { stroke-dashoffset:113 }
}
@keyframes dot-pulse {
  0%,100% { r:4; opacity:.5 }
  50%     { r:7; opacity:1 }
}
#a1-arc  { stroke-dasharray:452; stroke-dashoffset:452; animation:arc-draw 2.8s ease-out infinite; }
#a1-dot  { animation:dot-pulse 1.8s ease-in-out infinite 1.2s; }

/* ─── 2. DIAMANTE ─── */
@keyframes diamond-draw {
  0%       { stroke-dashoffset:352; opacity:.2 }
  65%      { stroke-dashoffset:0;   opacity:1  }
  100%     { stroke-dashoffset:0;   opacity:1  }
}
@keyframes diamond-fill {
  0%,45%   { opacity:0;    transform:scale(.6) }
  80%      { opacity:.18;  transform:scale(1.05) }
  100%     { opacity:.15;  transform:scale(1) }
}
#a2-outer { stroke-dasharray:352; stroke-dashoffset:352; animation:diamond-draw 2.5s ease-out infinite; }
#a2-inner { transform-box:fill-box; transform-origin:center; animation:diamond-fill 2.5s ease-out infinite; }

/* ─── 3. GRID DE PUNTOS ─── */
@keyframes ripple { 0%,100%{opacity:.06} 50%{opacity:.9} }
.gdot { animation:ripple 2.2s ease-in-out infinite; }

/* ─── 4. HEXÁGONO ─── */
@keyframes hex-outer-draw {
  0%       { stroke-dashoffset:397 }
  65%      { stroke-dashoffset:0 }
  100%     { stroke-dashoffset:0 }
}
@keyframes hex-inner-draw {
  0%,30%   { stroke-dashoffset:198; opacity:0 }
  85%      { stroke-dashoffset:0;   opacity:.45 }
  100%     { stroke-dashoffset:0;   opacity:.45 }
}
#a4-outer { stroke-dasharray:397; stroke-dashoffset:397; animation:hex-outer-draw 2.8s ease-out infinite; }
#a4-inner { stroke-dasharray:198; stroke-dashoffset:198; animation:hex-inner-draw 2.8s ease-out infinite; }

/* ─── 5. RELÁMPAGO ─── */
@keyframes bolt-in {
  0%        { transform:scale(.2) translateY(-10px); opacity:0 }
  30%       { transform:scale(1.12);                 opacity:1 }
  42%       { transform:scale(.96);                  opacity:1 }
  50%,72%   { transform:scale(1);                    opacity:1 }
  74%,78%   { opacity:.15 }
  80%,90%   { opacity:1  }
  92%,96%   { opacity:.2 }
  100%      { transform:scale(1);                    opacity:1 }
}
#a5-bolt { transform-box:fill-box; transform-origin:center; animation:bolt-in 3s ease-out infinite; }

/* ─── 6. TRIÁNGULO ─── */
@keyframes tri-draw {
  0%       { stroke-dashoffset:358 }
  60%      { stroke-dashoffset:0 }
  100%     { stroke-dashoffset:0 }
}
@keyframes tri-fill {
  0%,40%   { opacity:0 }
  80%      { opacity:.2 }
  100%     { opacity:.18 }
}
#a6-outer { stroke-dasharray:358; stroke-dashoffset:358; animation:tri-draw 2.5s ease-out infinite; }
#a6-inner { animation:tri-fill 2.5s ease-out infinite; }

/* ─── 7. WAVEFORM ─── */
.wbar { transform-box:fill-box; transform-origin:50% 50%; }
@keyframes wb0  { 0%,100%{transform:scaleY(.12)} 50%{transform:scaleY(.55)} }
@keyframes wb1  { 0%,100%{transform:scaleY(.2)}  50%{transform:scaleY(.8)}  }
@keyframes wb2  { 0%,100%{transform:scaleY(.35)} 50%{transform:scaleY(1)}   }
@keyframes wb3  { 0%,100%{transform:scaleY(.55)} 50%{transform:scaleY(.75)} }
@keyframes wb4  { 0%,100%{transform:scaleY(.8)}  50%{transform:scaleY(.35)} }
@keyframes wb5  { 0%,100%{transform:scaleY(1)}   50%{transform:scaleY(.2)}  }
@keyframes wb6  { 0%,100%{transform:scaleY(.8)}  50%{transform:scaleY(.45)} }
@keyframes wb7  { 0%,100%{transform:scaleY(.55)} 50%{transform:scaleY(.95)} }
@keyframes wb8  { 0%,100%{transform:scaleY(.35)} 50%{transform:scaleY(.8)}  }
@keyframes wb9  { 0%,100%{transform:scaleY(.2)}  50%{transform:scaleY(.55)} }
@keyframes wb10 { 0%,100%{transform:scaleY(.12)} 50%{transform:scaleY(.3)}  }

/* ─── 8. ARCOS CONCÉNTRICOS ─── */
@keyframes ac1 { 0%{stroke-dashoffset:477} 55%{stroke-dashoffset:0} 100%{stroke-dashoffset:0} }
@keyframes ac2 { 0%,12%{stroke-dashoffset:415} 65%{stroke-dashoffset:0} 100%{stroke-dashoffset:0} }
@keyframes ac3 { 0%,24%{stroke-dashoffset:327} 75%{stroke-dashoffset:0} 100%{stroke-dashoffset:0} }
@keyframes ac4 { 0%,36%{stroke-dashoffset:226} 85%{stroke-dashoffset:0} 100%{stroke-dashoffset:0} }
@keyframes radar-spin { to { transform:rotate(360deg) } }

#a8-group { transform-box:fill-box; transform-origin:center; animation:radar-spin 14s linear infinite; }
#a8-r1 { stroke-dasharray:477; stroke-dashoffset:477; animation:ac1 3.2s ease-out infinite; }
#a8-r2 { stroke-dasharray:415; stroke-dashoffset:415; animation:ac2 3.2s ease-out infinite; }
#a8-r3 { stroke-dasharray:327; stroke-dashoffset:327; animation:ac3 3.2s ease-out infinite; }
#a8-r4 { stroke-dasharray:226; stroke-dashoffset:226; animation:ac4 3.2s ease-out infinite; }

/* ─── Replay ─── */
.replay {
  background:transparent;
  border:1px solid rgba(0,238,0,.35);
  color:rgba(0,238,0,.8);
  font-family:inherit; font-size:12px; font-weight:600;
  padding:8px 20px; border-radius:100px; cursor:pointer;
  letter-spacing:.3px; transition:all 150ms;
}
.replay:hover { background:rgba(0,238,0,.08); border-color:rgba(0,238,0,.6); }
</style>
</head>
<body>

<h1>8 figuras — exploración de animaciones</h1>

<div class="grid">

  <!-- 1 · Arco de progreso -->
  <div class="card">
    <div class="canvas">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="55" fill="none" stroke="#00ee00" stroke-width="1" opacity=".12"/>
        <circle id="a1-arc" cx="80" cy="80" r="72"
          fill="none" stroke="#00ee00" stroke-width="6" stroke-linecap="round"
          transform="rotate(-90 80 80)"/>
        <circle id="a1-dot" cx="80" cy="80" r="4" fill="#00ee00" opacity=".6"/>
      </svg>
    </div>
    <span class="label">1 — Arco de progreso</span>
  </div>

  <!-- 2 · Diamante -->
  <div class="card">
    <div class="canvas">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <polygon id="a2-inner" points="80,35 125,80 80,125 35,80"
          fill="#00ee00" opacity="0"/>
        <polygon id="a2-outer" points="80,14 146,80 80,146 14,80"
          fill="none" stroke="#00ee00" stroke-width="3" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="label">2 — Diamante</span>
  </div>

  <!-- 3 · Grid de puntos -->
  <div class="card">
    <div class="canvas">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <!-- center -->
        <circle class="gdot" cx="80" cy="80" r="6" fill="#00ee00" style="animation-delay:0s"/>
        <!-- ring 1 (d=1) -->
        <circle class="gdot" cx="110" cy="80"  r="5" fill="#00ee00" style="animation-delay:.18s"/>
        <circle class="gdot" cx="50"  cy="80"  r="5" fill="#00ee00" style="animation-delay:.18s"/>
        <circle class="gdot" cx="80"  cy="110" r="5" fill="#00ee00" style="animation-delay:.18s"/>
        <circle class="gdot" cx="80"  cy="50"  r="5" fill="#00ee00" style="animation-delay:.18s"/>
        <!-- ring √2 -->
        <circle class="gdot" cx="110" cy="110" r="4" fill="#00ee00" style="animation-delay:.32s"/>
        <circle class="gdot" cx="50"  cy="50"  r="4" fill="#00ee00" style="animation-delay:.32s"/>
        <circle class="gdot" cx="110" cy="50"  r="4" fill="#00ee00" style="animation-delay:.32s"/>
        <circle class="gdot" cx="50"  cy="110" r="4" fill="#00ee00" style="animation-delay:.32s"/>
        <!-- ring 2 -->
        <circle class="gdot" cx="140" cy="80"  r="3" fill="#00ee00" style="animation-delay:.5s"/>
        <circle class="gdot" cx="20"  cy="80"  r="3" fill="#00ee00" style="animation-delay:.5s"/>
        <circle class="gdot" cx="80"  cy="140" r="3" fill="#00ee00" style="animation-delay:.5s"/>
        <circle class="gdot" cx="80"  cy="20"  r="3" fill="#00ee00" style="animation-delay:.5s"/>
        <!-- ring √5 -->
        <circle class="gdot" cx="140" cy="110" r="2.5" fill="#00ee00" style="animation-delay:.66s"/>
        <circle class="gdot" cx="140" cy="50"  r="2.5" fill="#00ee00" style="animation-delay:.66s"/>
        <circle class="gdot" cx="20"  cy="110" r="2.5" fill="#00ee00" style="animation-delay:.66s"/>
        <circle class="gdot" cx="20"  cy="50"  r="2.5" fill="#00ee00" style="animation-delay:.66s"/>
        <circle class="gdot" cx="110" cy="140" r="2.5" fill="#00ee00" style="animation-delay:.66s"/>
        <circle class="gdot" cx="50"  cy="140" r="2.5" fill="#00ee00" style="animation-delay:.66s"/>
        <circle class="gdot" cx="110" cy="20"  r="2.5" fill="#00ee00" style="animation-delay:.66s"/>
        <circle class="gdot" cx="50"  cy="20"  r="2.5" fill="#00ee00" style="animation-delay:.66s"/>
        <!-- ring 2√2 (corners) -->
        <circle class="gdot" cx="140" cy="140" r="2" fill="#00ee00" style="animation-delay:.82s"/>
        <circle class="gdot" cx="20"  cy="20"  r="2" fill="#00ee00" style="animation-delay:.82s"/>
        <circle class="gdot" cx="140" cy="20"  r="2" fill="#00ee00" style="animation-delay:.82s"/>
        <circle class="gdot" cx="20"  cy="140" r="2" fill="#00ee00" style="animation-delay:.82s"/>
      </svg>
    </div>
    <span class="label">3 — Grid de puntos</span>
  </div>

  <!-- 4 · Hexágono -->
  <div class="card">
    <div class="canvas">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <polygon id="a4-inner"
          points="80,46 113.5,64 113.5,100 80,118 46.5,100 46.5,64"
          fill="none" stroke="#00ee00" stroke-width="1.5"/>
        <polygon id="a4-outer"
          points="80,12 138.5,44 138.5,108 80,140 21.5,108 21.5,44"
          fill="none" stroke="#00ee00" stroke-width="3"/>
        <circle cx="80" cy="80" r="4" fill="#00ee00"/>
      </svg>
    </div>
    <span class="label">4 — Hexágono</span>
  </div>

  <!-- 5 · Relámpago -->
  <div class="card">
    <div class="canvas">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="62" fill="#00ee00" opacity=".05"/>
        <g id="a5-bolt">
          <polygon
            points="88,18 52,88 74,88 65,148 108,78 86,78"
            fill="#00ee00"/>
        </g>
      </svg>
    </div>
    <span class="label">5 — Relámpago</span>
  </div>

  <!-- 6 · Triángulo -->
  <div class="card">
    <div class="canvas">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <polygon id="a6-inner" points="80,55 108,108 52,108" fill="#00ee00" opacity="0"/>
        <polygon id="a6-outer"
          points="80,14 142,120 18,120"
          fill="none" stroke="#00ee00" stroke-width="3" stroke-linejoin="round"/>
        <circle cx="80" cy="14" r="4" fill="#00ee00" opacity=".8"/>
      </svg>
    </div>
    <span class="label">6 — Triángulo</span>
  </div>

  <!-- 7 · Waveform -->
  <div class="card">
    <div class="canvas">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <!-- 11 bars, centered at y=80 -->
        <rect class="wbar" x="9"   y="70"   width="8" height="20"  rx="4" fill="#00ee00" opacity=".22" style="animation:wb0  1.3s ease-in-out infinite; animation-delay:0s"/>
        <rect class="wbar" x="22"  y="62.5" width="8" height="35"  rx="4" fill="#00ee00" opacity=".35" style="animation:wb1  1.1s ease-in-out infinite; animation-delay:.08s"/>
        <rect class="wbar" x="35"  y="52.5" width="8" height="55"  rx="4" fill="#00ee00" opacity=".5"  style="animation:wb2  1.0s ease-in-out infinite; animation-delay:.18s"/>
        <rect class="wbar" x="48"  y="42.5" width="8" height="75"  rx="4" fill="#00ee00" opacity=".65" style="animation:wb3   .9s ease-in-out infinite; animation-delay:.06s"/>
        <rect class="wbar" x="61"  y="30"   width="8" height="100" rx="4" fill="#00ee00" opacity=".8"  style="animation:wb4   .75s ease-in-out infinite; animation-delay:.14s"/>
        <rect class="wbar" x="74"  y="15"   width="8" height="130" rx="4" fill="#00ee00" opacity="1"   style="animation:wb5   .65s ease-in-out infinite; animation-delay:0s"/>
        <rect class="wbar" x="87"  y="30"   width="8" height="100" rx="4" fill="#00ee00" opacity=".8"  style="animation:wb6   .75s ease-in-out infinite; animation-delay:.1s"/>
        <rect class="wbar" x="100" y="42.5" width="8" height="75"  rx="4" fill="#00ee00" opacity=".65" style="animation:wb7   .9s ease-in-out infinite; animation-delay:.2s"/>
        <rect class="wbar" x="113" y="52.5" width="8" height="55"  rx="4" fill="#00ee00" opacity=".5"  style="animation:wb8  1.0s ease-in-out infinite; animation-delay:.05s"/>
        <rect class="wbar" x="126" y="62.5" width="8" height="35"  rx="4" fill="#00ee00" opacity=".35" style="animation:wb9  1.1s ease-in-out infinite; animation-delay:.12s"/>
        <rect class="wbar" x="139" y="70"   width="8" height="20"  rx="4" fill="#00ee00" opacity=".22" style="animation:wb10 1.3s ease-in-out infinite; animation-delay:.08s"/>
      </svg>
    </div>
    <span class="label">7 — Waveform</span>
  </div>

  <!-- 8 · Arcos concéntricos -->
  <div class="card">
    <div class="canvas">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <g id="a8-group" style="transform-origin:80px 80px">
          <circle id="a8-r1" cx="80" cy="80" r="76"
            fill="none" stroke="#00ee00" stroke-width="2.5" stroke-linecap="round"
            transform="rotate(-90 80 80)" opacity=".9"/>
          <circle id="a8-r2" cx="80" cy="80" r="66"
            fill="none" stroke="#00ee00" stroke-width="1.5" stroke-linecap="round"
            transform="rotate(-90 80 80)" opacity=".6"/>
          <circle id="a8-r3" cx="80" cy="80" r="52"
            fill="none" stroke="#00ee00" stroke-width="1.5" stroke-linecap="round"
            transform="rotate(-90 80 80)" opacity=".35"/>
          <circle id="a8-r4" cx="80" cy="80" r="36"
            fill="none" stroke="#00ee00" stroke-width="1.5" stroke-linecap="round"
            transform="rotate(-90 80 80)" opacity=".2"/>
        </g>
        <circle cx="80" cy="80" r="4" fill="#00ee00"/>
      </svg>
    </div>
    <span class="label">8 — Arcos concéntricos</span>
  </div>

</div>

<button class="replay" onclick="location.reload()">↺ Reiniciar animaciones</button>

</body>
</html>
